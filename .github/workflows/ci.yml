name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check netbox_rir_manager tests
      - run: uv run ruff format --check netbox_rir_manager tests

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for Codecov OIDC upload
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13", "3.14"]
        netbox: ["v4.5.0"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: netbox
          POSTGRES_USER: netbox
          POSTGRES_PASSWORD: ci-password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Install NetBox ${{ matrix.netbox }}
        run: |
          git clone --depth 1 --branch ${{ matrix.netbox }} \
            https://github.com/netbox-community/netbox.git /tmp/netbox

      - name: Configure NetBox
        run: |
          cp .devcontainer/configuration/configuration.py /tmp/netbox/netbox/netbox/
          cat >> /tmp/netbox/netbox/netbox/configuration.py << 'EOF_PLUGINS'

          PLUGINS.append("netbox_rir_manager")
          PLUGINS_CONFIG["netbox_rir_manager"] = {}
          EOF_PLUGINS

          cat >> /tmp/netbox/netbox/netbox/configuration.py << 'EOF_DBREDIS'

          DATABASE = {
              'NAME': 'netbox',
              'USER': 'netbox',
              'PASSWORD': 'ci-password',
              'HOST': 'localhost',
              'PORT': '5432',
          }

          REDIS = {
              'tasks':   {'HOST': 'localhost', 'PORT': 6379, 'PASSWORD': '', 'DATABASE': 0, 'SSL': False},
              'caching': {'HOST': 'localhost', 'PORT': 6379, 'PASSWORD': '', 'DATABASE': 1, 'SSL': False},
          }
          EOF_DBREDIS

      - name: Install plugin and NetBox dependencies
        run: |
          uv venv
          uv pip install -r /tmp/netbox/requirements.txt
          uv pip install -e ".[dev]"
          # Activate the venv for all subsequent steps (uv run won't find
          # this project from /tmp/netbox/netbox, so we use plain `python`
          # backed by VIRTUAL_ENV + PATH).
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Run migrations
        env:
          PYTHONPATH: /tmp/netbox/netbox
          DJANGO_SETTINGS_MODULE: netbox.settings
          NETBOX_CONFIGURATION: netbox.configuration
          SECRET_KEY: "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*(-_=+)"
        run: |
          cd /tmp/netbox/netbox
          python manage.py migrate --noinput

      - name: Run pytest with coverage
        env:
          PYTHONPATH: /tmp/netbox/netbox
          DJANGO_SETTINGS_MODULE: netbox.settings
          NETBOX_CONFIGURATION: netbox.configuration
          SECRET_KEY: "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*(-_=+)"
        run: |
          pytest tests/ -v --tb=short --cov=netbox_rir_manager --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python == '3.13'
        continue-on-error: true  # OIDC fails gracefully if codecov.io isn't linked yet
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Check migrations
        env:
          PYTHONPATH: /tmp/netbox/netbox
          DJANGO_SETTINGS_MODULE: netbox.settings
          NETBOX_CONFIGURATION: netbox.configuration
          SECRET_KEY: "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*(-_=+)"
        run: |
          cd /tmp/netbox/netbox
          python manage.py makemigrations --check --dry-run

      - name: Django system check
        env:
          PYTHONPATH: /tmp/netbox/netbox
          DJANGO_SETTINGS_MODULE: netbox.settings
          NETBOX_CONFIGURATION: netbox.configuration
          SECRET_KEY: "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*(-_=+)"
        run: |
          cd /tmp/netbox/netbox
          python manage.py check

  build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
